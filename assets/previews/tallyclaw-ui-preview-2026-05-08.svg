    <rect x="104" y="74" width="128" height="60" fill="#22345f"/>
    <rect x="118" y="92" width="16" height="16" fill="#73f0ff"/>
    <rect x="134" y="108" width="16" height="16" fill="#73f0ff"/>
    <rect x="150" y="92" width="16" height="16" fill="#73f0ff"/>
