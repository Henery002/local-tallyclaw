<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101521"/>
      <stop offset="0.55" stop-color="#1c2332"/>
      <stop offset="1" stop-color="#0d121b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#eaf1ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="petShadow" x="-50%" y="-50%" width="200%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#315be8" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; font-size: 34px; font-weight: 750; fill: #121827; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; font-size: 22px; font-weight: 700; fill: #6a7890; }
      .value { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; font-size: 48px; font-weight: 800; fill: #111827; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; font-size: 19px; font-weight: 650; fill: #7a879a; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; font-size: 16px; font-weight: 650; fill: #78869b; }
      .mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 18px; font-weight: 700; fill: #50627d; }
      .pixel { shape-rendering: crispEdges; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#desk)"/>

  <g opacity="0.28">
    <rect x="84" y="88" width="260" height="162" rx="18" fill="#273145"/>
    <rect x="384" y="118" width="220" height="104" rx="16" fill="#263044"/>
